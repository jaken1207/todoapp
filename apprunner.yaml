version: 1.0
runtime: nodejs22
build:
  commands:
    build: |
      cd server
      npm ci
      npm run build
      npx prisma migrate deploy || npx prisma db push
run:
  runtime-version: 22
  command: node dist/index.js
  port: 8080
  env:
    - name: DATABASE_URL
      value: file:./dev.db
  network:
    ingress:
      is-publicly-accessible: true

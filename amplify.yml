version: 1
applications:
  - appRoot: client
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm ci --prefix client
        build:
          commands:
            - npm run build --prefix client
      artifacts:
        baseDirectory: client/out
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
    env:
      variables:
        NEXT_PUBLIC_API_URL: https://api.example.com
